name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # mcp__github_inline_comment__create_inline_comment is the action's built-in
          # buffering tool — Claude calls it to queue inline review comments, then
          # post-buffered-inline-comments.ts posts them all after Claude finishes.
          # Without this in allowedTools, Claude tries other GitHub tools (denied) and
          # the buffer stays empty → zero comments posted despite a successful run.
          claude_args: --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(git diff:*),Bash(git log:*),Read,Glob,Grep"
          prompt: |
            Review PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            Start by reading CLAUDE.md to understand project conventions, then get the diff:
              gh pr diff ${{ github.event.pull_request.number }}

            Review the changed code for:
            - Correctness: logic errors, race conditions, nil/panic risks
            - Security: prompt-injection prevention in LLM calls, safe error handling
            - Go conventions: fmt.Errorf("context: %w", err) wrapping, context propagation
            - Test placement: per CLAUDE.md all tests must live in the top-level tests/
              package — flag any test files added inside internal/ or pkg/
            - Missing tests for new exported behaviour
            - Module paths: imports must use github.com/ajitpratap0/openclaw-cortex/...

            Use mcp__github_inline_comment__create_inline_comment for each issue found,
            pointing to the specific file and line. If the PR looks good overall,
            post a brief approval summary with gh pr comment.
