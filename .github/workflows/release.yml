name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Run tests
        run: go test -race -short -count=1 ./...

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
          VERSION: ${{ github.ref_name }}
        run: |
          go build \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o openclaw-cortex_${GOOS}_${GOARCH} \
            ./cmd/openclaw-cortex

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}-${{ matrix.arch }}
          path: openclaw-cortex_${{ matrix.os }}_${{ matrix.arch }}

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}

  full-benchmarks:
    name: Full Benchmark Suite
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 120

    services:
      memgraph:
        image: memgraph/memgraph-mage:latest
        ports:
          - "7687:7687"
        options: >-
          --health-cmd "echo > /dev/tcp/localhost/7687"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      ollama:
        image: ollama/ollama:latest
        ports:
          - "11434:11434"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: binary-linux-amd64

      - name: Make binary executable
        run: chmod +x openclaw-cortex_linux_amd64

      - name: Pull Ollama embedding model
        run: |
          # Wait for Ollama to be ready (up to 60s) then pull the embedding model.
          for i in $(seq 1 12); do
            if curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama ready after ${i}x5s"
              break
            fi
            echo "Waiting for Ollama... (attempt $i/12)"
            sleep 5
          done
          curl -sf http://localhost:11434/api/tags > /dev/null || (echo "Ollama never became ready" && exit 1)
          curl -X POST http://localhost:11434/api/pull \
            -H 'Content-Type: application/json' \
            -d '{"name":"nomic-embed-text"}' \
            --max-time 300

      - name: Download eval datasets
        run: bash scripts/download_eval_datasets.sh

      - name: Run full benchmarks
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          go run ./eval/cmd/eval \
            --benchmark locomo \
            --accumulate \
            --binary ./openclaw-cortex_linux_amd64 \
            --k 5 \
            --dataset-path eval/locomo/testdata/locomo_dataset.json \
            --output "results_locomo_${RELEASE_TAG}.json" \
            --timeout 7200
          go run ./eval/cmd/eval \
            --benchmark longmemeval \
            --accumulate \
            --binary ./openclaw-cortex_linux_amd64 \
            --k 5 \
            --dataset-path eval/longmemeval/testdata/longmemeval_dataset.json \
            --output "results_longmemeval_${RELEASE_TAG}.json" \
            --timeout 7200
          go run ./eval/cmd/eval \
            --benchmark dmr \
            --accumulate \
            --binary ./openclaw-cortex_linux_amd64 \
            --k 5 \
            --dataset-path eval/dmr/testdata/dmr_dataset.json \
            --output "results_dmr_${RELEASE_TAG}.json" \
            --timeout 7200

      - name: Generate comparison table
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          go run ./eval/cmd/compare \
            --baseline eval/baselines/published.json \
            --current "results_${RELEASE_TAG}.json" \
            --output "comparison_${RELEASE_TAG}.md"

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.ref_name }}
          path: |
            results_*.json
            comparison_*.md
            comparison.json

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: sha256sum openclaw-cortex_* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
          files: |
            openclaw-cortex_*
            checksums.txt
